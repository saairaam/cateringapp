[build]
  publish   = "frontend/dist"
  command   = "cd frontend && NODE_ENV=development npm install && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["backend/**", "node_modules/pdfkit/**", "node_modules/stream-to-array/**", "node_modules/buffer-crc32/**"]
  external_node_modules = ["pdfkit"]

# Redirect all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200

# SPA fallback — send everything else to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
